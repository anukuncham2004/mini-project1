<!DOCTYPE html>
<html>
<head>
  <title>Support Ticket System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
  <div class="container">
    <a class="navbar-brand fw-bold">
      🎫 Support Ticket System
    </a>

    <div>
      <a href="pages/login.html" class="btn btn-light me-2">
        Login
      </a>

      <a href="pages/dashboard.html" class="btn btn-warning">
        Dashboard
      </a>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<div class="bg-primary text-white text-center py-5">
  <div class="container">

    <h1 class="display-4 fw-bold">
      Support Ticket System
    </h1>

    <p class="lead">
      Create, Track and Manage Support Requests Efficiently
    </p>

    <a href="pages/create-ticket.html" class="btn btn-warning btn-lg me-2">
      Create Ticket
    </a>

    <a href="pages/dashboard.html" class="btn btn-outline-light btn-lg">
      View Dashboard
    </a>

  </div>
</div>

<!-- Statistics -->
<div class="container mt-5">

  <div class="row">

    <div class="col-md-4 mb-3">
      <div class="card shadow text-center">
        <div class="card-body">
          <h5>Total Tickets</h5>
          <h2 id="totalTickets">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow text-center">
        <div class="card-body">
          <h5>Open Tickets</h5>
          <h2 id="openTickets">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow text-center">
        <div class="card-body">
          <h5>Resolved Tickets</h5>
          <h2 id="resolvedTickets">0</h2>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Ticket List -->
<div class="container mt-5">

  <h2 class="mb-4">
    Ticket List
  </h2>

  <div id="tickets"></div>

</div>

<script>

function deleteTicket(id) {

  if (!confirm("Delete this ticket?")) {
    return;
  }

  fetch(`http://localhost:5000/api/tickets/${id}`, {
    method: "DELETE"
  })
  .then(response => response.json())
  .then(data => {

    alert("Ticket Deleted Successfully");

    location.reload();

  })
  .catch(error => {

    console.log(error);

    alert("Failed to delete ticket");

  });

}

fetch("http://localhost:5000/api/tickets")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("tickets");

    document.getElementById("totalTickets").innerText = data.length;

    const openCount = data.filter(
      ticket => ticket.status === "Open"
    ).length;

    document.getElementById("openTickets").innerText = openCount;

    document.getElementById("resolvedTickets").innerText =
      data.length - openCount;

    if (!data.length) {

      container.innerHTML =
        "<div class='alert alert-info'>No tickets found</div>";

      return;

    }

    data.forEach(t => {

      container.innerHTML += `
        <div class="card shadow mb-3">

          <div class="card-body">

            <h5 class="card-title">
              ${t.title}
            </h5>

            <p class="card-text">
              ${t.description}
            </p>

            <span class="badge bg-warning text-dark">
              ${t.status || "Open"}
            </span>

            <button
              class="btn btn-danger btn-sm float-end"
              onclick="deleteTicket(${t.id})">
              Delete
            </button>

          </div>

        </div>
      `;

    });

  })
  .catch(err => {

    console.log("Error:", err);

  });

</script>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  © 2026 Support Ticket System | Developed by Bhavani
</footer>

</body>
</html>
